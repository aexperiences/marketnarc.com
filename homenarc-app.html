<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>HomeNarc — are you over-assessed?</title>
<meta name="description" content="Enter your home's assessed value and a few comparable homes — HomeNarc checks whether you're likely over-assessed and estimates how much you may be overpaying in property tax. Runs entirely in your browser; nothing is sent anywhere.">
<meta name="theme-color" content="#26201A">
<link rel="icon" href="/homenarc-icon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#26201A;--ink800:#191510;--ink700:#372F26;--ink600:#453D32;--line:#453A2C;
 --accent:#E0A24E;--accent6:#C08A3E;--off:#EAF3F0;--sea:#AEC9A6;--ok:#56C98B;--warn:#E6B45C;--bad:#F0846A}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;min-height:100vh;background:radial-gradient(120% 80% at 50% -10%,#3A3226 0%,#14100B 55%,#0B0906 100%);
 font-family:Inter,-apple-system,Segoe UI,Roboto,sans-serif;color:var(--off);padding:26px 18px 70px}
.tnum{font-variant-numeric:tabular-nums}
.app{max-width:660px;margin:0 auto}
.head{display:flex;align-items:center;gap:11px;justify-content:center;margin-bottom:6px}
.head svg{width:34px;height:34px;border-radius:9px}
.head .wm{font-family:Lato;font-weight:900;font-size:24px}.head .wm .n{color:var(--accent)}
.sub{text-align:center;color:var(--sea);font-size:13.5px;font-style:italic;margin:0 0 4px}
.priv{text-align:center;color:var(--accent);font-size:12px;font-weight:600;margin:0 0 22px}
.card{background:rgba(26,58,102,.34);border:1px solid var(--line);border-radius:20px;padding:22px 20px;margin-bottom:18px}
.card h2{font-family:Lato;font-weight:900;font-size:16px;margin:0 0 4px}
.card .h2sub{color:var(--sea);font-size:13px;margin:0 0 15px}
.tog{display:flex;flex-direction:column;gap:10px;margin-bottom:4px}
.tog label{display:flex;align-items:flex-start;gap:11px;font-size:14px;cursor:pointer;color:var(--off)}
.tog input{margin-top:2px;width:18px;height:18px;accent-color:var(--accent);flex:0 0 auto}
.rows{display:flex;flex-direction:column;gap:9px;margin-bottom:12px}
.rw{display:grid;grid-template-columns:1fr 108px 34px;gap:8px;align-items:center}
.rw input{background:var(--ink800);border:1px solid var(--line);border-radius:10px;color:var(--off);
 font-family:Inter;font-size:14px;padding:11px 12px;width:100%}
.rw input:focus{outline:none;border-color:var(--accent)}
.rw input::placeholder{color:#8a7c62}
.rw .amtwrap{position:relative}.rw .amtwrap::before{content:"$";position:absolute;left:11px;top:11px;color:var(--sea);font-size:14px}
.rw .amtwrap input{padding-left:22px;text-align:right}
.rmx{background:none;border:1px solid var(--line);color:var(--sea);border-radius:9px;height:40px;cursor:pointer;font-size:16px}
.rmx:hover{border-color:var(--bad);color:var(--bad)}
.rowbtns{display:flex;gap:9px;flex-wrap:wrap}
.lnk{background:var(--ink700);border:1px solid var(--line);color:var(--off);font-weight:600;font-size:13px;border-radius:999px;padding:9px 15px;cursor:pointer}
.lnk:hover{border-color:var(--accent)}
.go{display:block;width:100%;margin-top:16px;background:var(--accent);color:var(--ink800);font-family:Lato;font-weight:900;
 font-size:17px;border:0;border-radius:14px;padding:16px;cursor:pointer;transition:.14s}
.go:hover{background:var(--accent6)}
.go:disabled{opacity:.45;cursor:default}
/* report */
#report{display:none}
.dsum{font-size:14px;color:var(--off);background:var(--ink800);border:1px solid var(--line);border-radius:11px;padding:11px 14px;margin:0 0 14px}
.dsum b{color:var(--accent)}
.line{border-top:1px solid var(--line);padding:11px 0}.line:first-child{border-top:0}
.lrow{display:flex;align-items:baseline;gap:8px}
.lname{font-weight:700;font-size:14.5px;line-height:1.25}
.lwhat{display:block;color:var(--sea);font-size:12.5px;font-weight:400;margin-top:2px}
.lamt{margin-left:auto;font-family:Lato;font-weight:900;font-size:14px;white-space:nowrap}
.chip{display:inline-block;margin-top:7px;font-size:9.5px;font-weight:800;letter-spacing:.3px;padding:3px 9px;border-radius:999px;text-transform:uppercase}
.chip.ok{color:#0C2038;background:var(--ok)}.chip.warn{color:var(--warn);border:1px solid var(--warn)}.chip.bad{color:#2A0F0A;background:var(--bad)}
.lflag{margin-top:8px;font-size:13px;line-height:1.45;border-radius:9px;padding:9px 12px}
.lflag.warn{background:rgba(230,180,92,.10);border-left:3px solid var(--warn)}
.lflag.bad{background:rgba(240,132,106,.11);border-left:3px solid var(--bad)}
.lflag b{color:var(--off)}
.bottom{background:var(--ink800);border:1px solid var(--line);border-radius:12px;padding:14px;margin:12px 0}
.brow{display:flex;align-items:baseline;justify-content:space-between;font-size:14px;padding:4px 0}
.brow span{color:var(--sea)}.brow b{font-family:Lato;font-weight:900}
.brow.big{border-top:1px solid var(--line);margin-top:6px;padding-top:10px}.brow.big b{font-size:20px;color:var(--accent)}
.strike{text-decoration:line-through;opacity:.6}
.todo{font-size:14px;line-height:1.55;color:var(--off);background:rgba(224,162,78,.08);border:1px solid #6a5730;border-radius:11px;padding:12px 14px;margin-bottom:12px}
.todo b{color:var(--accent)}.todo ul{margin:8px 0 0;padding-left:18px}.todo li{margin-bottom:5px}
.nfa{font-size:12px;color:var(--sea);text-align:center;line-height:1.5;margin:6px 0 0}
.foot{text-align:center;margin-top:22px}
.foot a{color:var(--accent);font-weight:700;text-decoration:none;font-size:14px}
.brandmark{width:42px;height:41px;margin:24px auto 8px;opacity:.78;background:url(/ae-mark.png) center/contain no-repeat}
</style>
</head>
<body>
<div class="app">
  <div class="head">
    <svg viewBox="0 0 1024 1024" aria-hidden="true"><rect width="1024" height="1024" rx="232" fill="#26201A"/><circle cx="445" cy="430" r="235" fill="none" stroke="#E0A24E" stroke-width="64"/><polyline points="362,525 362,335 528,525 528,335" fill="none" stroke="#E0A24E" stroke-width="46" stroke-linecap="round" stroke-linejoin="round"/><line x1="612" y1="597" x2="775" y2="760" stroke="#E0A24E" stroke-width="82" stroke-linecap="round"/></svg>
    <span class="wm">Home<span class="n">Narc</span></span>
  </div>
  <p class="sub">are you overpaying? let's check.</p>
  <p class="priv">🔒 Runs entirely in your browser. Nothing you type is sent anywhere.</p>

  <div class="card">
    <h2>1 · Your assessment</h2>
    <div class="rows">
      <div class="rw">
        <input id="assessedLbl" value="Your home's assessed value ($)" disabled aria-hidden="true" tabindex="-1">
        <div class="amtwrap"><input inputmode="decimal" id="assessed" placeholder="0"></div>
        <span></span>
      </div>
      <div class="rw">
        <input id="taxLbl" value="Your annual property tax ($) — optional" disabled aria-hidden="true" tabindex="-1">
        <div class="amtwrap"><input inputmode="decimal" id="tax" placeholder="0"></div>
        <span></span>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>2 · Comparable homes nearby</h2>
    <p class="h2sub">Assessed value or recent sale price of a few similar homes.</p>
    <div class="rows">
      <div class="rw">
        <input value="Comparable home #1 ($)" disabled aria-hidden="true" tabindex="-1">
        <div class="amtwrap"><input inputmode="decimal" id="c1" placeholder="0"></div>
        <span></span>
      </div>
      <div class="rw">
        <input value="Comparable home #2 ($)" disabled aria-hidden="true" tabindex="-1">
        <div class="amtwrap"><input inputmode="decimal" id="c2" placeholder="0"></div>
        <span></span>
      </div>
      <div class="rw">
        <input value="Comparable home #3 ($)" disabled aria-hidden="true" tabindex="-1">
        <div class="amtwrap"><input inputmode="decimal" id="c3" placeholder="0"></div>
        <span></span>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>3 · Two quick questions</h2>
    <div class="tog">
      <label><input type="checkbox" id="primary"> This is my <b>primary residence</b></label>
      <label><input type="checkbox" id="homestead"> A <b>homestead exemption</b> is already applied to my tax bill</label>
    </div>
    <div class="rowbtns" style="margin-top:16px">
      <button class="lnk" onclick="loadSample()">Load a sample</button>
      <button class="lnk" onclick="clearAll()">Clear</button>
    </div>
    <button class="go" id="go" onclick="decode()">Check my assessment →</button>
  </div>

  <div class="card" id="report">
    <h2>HomeNarc's read</h2>
    <div id="reportbody"></div>
  </div>

  <div class="foot"><a href="/homenarc">← Back to HomeNarc</a> &nbsp;·&nbsp; <a href="/">The Narcs</a></div>
</div>

<script>
function money(v){v=(''+v).replace(/[^0-9.\-]/g,'');var n=parseFloat(v);return isNaN(n)?0:n;}
function fmt(n){return '$'+Math.round(n).toLocaleString();}
function median(a){var b=a.slice().sort(function(x,y){return x-y;});var m=Math.floor(b.length/2);return b.length%2?b[m]:(b[m-1]+b[m])/2;}

function clearAll(){
  document.getElementById('assessed').value='';document.getElementById('tax').value='';
  document.getElementById('c1').value='';document.getElementById('c2').value='';document.getElementById('c3').value='';
  document.getElementById('primary').checked=false;document.getElementById('homestead').checked=false;
  document.getElementById('report').style.display='none';
}
function loadSample(){
  document.getElementById('assessed').value='420000';document.getElementById('tax').value='6300';
  document.getElementById('c1').value='355000';document.getElementById('c2').value='360000';document.getElementById('c3').value='365000';
  document.getElementById('primary').checked=true;document.getElementById('homestead').checked=false;
}
function decode(){
  var assessed=money(document.getElementById('assessed').value);
  var tax=money(document.getElementById('tax').value);
  var comps=[document.getElementById('c1').value,document.getElementById('c2').value,document.getElementById('c3').value]
    .map(money).filter(function(v){return v>0;});
  var primary=document.getElementById('primary').checked;
  var homestead=document.getElementById('homestead').checked;

  var rep=document.getElementById('report');
  if(!(assessed>0 && comps.length>=1)){
    document.getElementById('reportbody').innerHTML=
      '<p class="dsum">To check your assessment, enter your <b>home\'s assessed value</b> and at least <b>one comparable home</b> nearby. Then tap “Check my assessment.”</p>';
    rep.style.display='block';rep.scrollIntoView({behavior:'smooth'});return;
  }

  var med=median(comps);
  var overPct=(assessed-med)/med;
  var rate=tax>0?tax/assessed:0.012;
  var overAmt=Math.max(0,assessed-med);
  var estOverpay=overAmt*rate;
  var over=overPct>=0.10;

  var chipTxt={ok:"✓ Looks fair",warn:"⚠ Worth appealing",bad:"✕ Fix this"};
  var lines=[];

  // Assessed value
  lines.push(line("Assessed value","what the county says it's worth",fmt(assessed),
    over?"warn":"ok",
    over?"You're about <b>"+Math.round(overPct*100)+"%</b> above comparable homes (median "+fmt(med)+"). That's roughly <b>"+fmt(estOverpay)+"/yr</b> in extra tax. You can appeal with comps.":""));

  // Comparable homes
  lines.push(line("Comparable homes","what similar homes are valued at",fmt(med)+" median","ok",""));

  // Property tax rate
  lines.push(line("Property tax rate","the % applied to value",(rate*100).toFixed(2)+"%"+(tax>0?"":" (assumed)"),"ok",""));

  // Homestead exemption
  var hsFix=primary&&!homestead;
  lines.push(line("Homestead exemption","a discount for your primary home",(homestead?"applied":"not applied"),
    hsFix?"bad":"ok",
    hsFix?"If you live here, you likely qualify (often $25k–50k off the taxable value). It's not applied — <b>applying it lowers your bill going forward.</b>":""));

  function line(name,what,amt,s,why){
    return '<div class="line"><div class="lrow"><span class="lname">'+escapeHtml(name)
      +'<span class="lwhat">'+what+'</span></span><span class="lamt tnum">'+amt+'</span></div>'
      +'<div><span class="chip '+s+'">'+chipTxt[s]+'</span></div>'
      +(why?'<div class="lflag '+s+'">'+why+'</div>':'')+'</div>';
  }

  var linesHtml=lines.join('');

  var sumTxt = over
    ? ("Assessed at "+fmt(assessed)+", comps median "+fmt(med)+" — <b>you look about "+Math.round(overPct*100)+"% high.</b>")
    : ("Assessed at "+fmt(assessed)+", comps median "+fmt(med)+" — <b>roughly in line.</b>");

  var bottomRows=[["Assessed",fmt(assessed),over],["Comps median",fmt(med),false]];
  var bottomHtml=bottomRows.map(function(r){
    return '<div class="brow"><span>'+r[0]+'</span><b class="tnum'+(r[2]?' strike':'')+'">'+r[1]+'</b></div>';
  }).join('');
  var bigVal=over?"~"+fmt(estOverpay)+"/yr":"none obvious";

  var todos=[];
  if(over)todos.push("File an assessment appeal with 2–3 comps — <b>deadlines are usually 30–45 days after your notice</b>, so check yours now.");
  if(primary&&!homestead)todos.push("Apply for the homestead exemption.");
  if(tax<=0)todos.push("Grab your actual tax rate off your bill for a sharper estimate.");
  if(!over && !(primary&&!homestead))todos.push("Looks fair — recheck after any reassessment or nearby sales.");

  var html='<p class="dsum">'+sumTxt+'</p>'+linesHtml
    +'<div class="bottom">'+bottomHtml
    +'<div class="brow big"><span>Est. overpayment</span><b>'+bigVal+'</b></div></div>'
    +'<div class="todo"><b>What I\'d do:</b><ul><li>'+todos.join('</li><li>')+'</li></ul></div>'
    +'<p class="nfa">Educational estimate from the numbers you entered — <b>not legal or tax advice</b>. Assessment ratios and appeal deadlines vary by county; confirm yours. Nothing you typed left your browser.</p>';
  document.getElementById('reportbody').innerHTML=html;
  rep.style.display='block';rep.scrollIntoView({behavior:'smooth'});
}
function escapeHtml(s){return (''+s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
</script>
<div class="brandmark" aria-label="Accelerated Experiences" title="An Accelerated Experiences app"></div>
</body>
</html>
